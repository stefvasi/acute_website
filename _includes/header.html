<header class="site-header">
  <div class="container site-header__inner">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <img src="{{ '/images/logo_alt.svg' | relative_url }}" alt="ACUTE Research Laboratories">
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav"><ul class="site-nav__list">
      <li><a href="{{ '/' | relative_url }}" class="site-nav__link{% if page.url == '/' %} is-active{% endif %}">Home</a></li>
      <li><a href="{{ '/research/' | relative_url }}" class="site-nav__link{% if page.url contains '/research' %} is-active{% endif %}">Research</a></li>
      <li><a href="{{ '/publications/' | relative_url }}" class="site-nav__link{% if page.url contains '/publications' %} is-active{% endif %}">Publications</a></li>
      <li><a href="{{ '/team/' | relative_url }}" class="site-nav__link{% if page.url contains '/team' %} is-active{% endif %}">Team</a></li>
      <li><a href="{{ '/contact/' | relative_url }}" class="site-nav__link{% if page.url contains '/contact' %} is-active{% endif %}">Contact</a></li>
    </ul></nav>
  </div>
</header>
