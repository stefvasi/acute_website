title: "ACUTE Lab"
description: "ACoUstic and Tactile Engineering — Research Laboratory, University of Iceland"
url: "https://stefvasi.github.io"
baseurl: "/acute_website"

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty

collections:
  team:
    output: true
    permalink: /team/:name/
    sort_by: order

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - "*.sh"
  - .DS_Store
  - lancedb/
  - mnt/
  - preview.html
  - ACUTE_preview_images.html
  - ACUTE_inner_pages.html
  - CLAUDE.md
  - .github/
  - vendor/
  - Mohammad_content/
  - .playwright-mcp/
  - _cite/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
